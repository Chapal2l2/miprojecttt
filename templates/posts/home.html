
{% extends 'base.html' %}
{% block content %}

<h2>Create Post</h2>
{% if user.is_authenticated %}
<form method="post">
{% csrf_token %}
{{form.as_p}}
<button type="submit">Post</button>
</form>
{% endif %}

<hr>

<h2>Posts</h2>
{% for post in posts %}
<p><b>{{post.author.username}}</b>: {{post.content}}</p>
{% empty %}
<p>No posts yet</p>
{% endfor %}

{% endblock %}
